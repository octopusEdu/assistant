<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>ИИ‑чек‑ин | Осьминог EDU · Морские приключения AI — Компактный трекер</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      font-family: 'Segoe UI', 'Arial', system-ui, sans-serif;
      background: #caeef5;
      min-height: 100vh;
      position: relative;
      color: #004d4d;
      padding: 16px;
      overflow-x: hidden;
    }

    #seaCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      display: block;
      pointer-events: none;
      background: linear-gradient(145deg, #b4dfe5 0%, #6bb5c2 100%);
    }

    .paper-boat {
      position: fixed;
      bottom: 8%;
      left: 3%;
      width: 75px;
      height: 60px;
      z-index: 8;
      pointer-events: none;
      filter: drop-shadow(2px 4px 8px rgba(0,0,0,0.2));
      animation: gentleFloat 6s infinite ease-in-out;
    }

    @keyframes gentleFloat {
      0% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-5px) rotate(2deg); }
      100% { transform: translateY(0px) rotate(0deg); }
    }

    .ai-fish {
      position: fixed;
      z-index: 9;
      pointer-events: none;
      display: flex;
      align-items: center;
      gap: 4px;
      background: rgba(255,255,245,0.7);
      backdrop-filter: blur(5px);
      padding: 3px 10px 3px 8px;
      border-radius: 16px;
      font-size: 11px;
      font-weight: 600;
      color: #0a4b54;
      font-family: 'Segoe UI', system-ui;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      white-space: nowrap;
      border: 1px solid rgba(0,168,181,0.4);
    }
    .ai-fish svg { width: 16px; height: 12px; filter: drop-shadow(0 1px 1px rgba(0,0,0,0.1)); }
    
    @keyframes swimLazy {
      0% { transform: translateX(-15px) translateY(0px); opacity: 0.9; }
      25% { transform: translateX(15px) translateY(-6px); }
      50% { transform: translateX(30px) translateY(4px); }
      75% { transform: translateX(15px) translateY(-2px); }
      100% { transform: translateX(-15px) translateY(0px); }
    }
    @keyframes swimHorizontal {
      0% { transform: translateX(-20px) translateY(0px); }
      50% { transform: translateX(20px) translateY(-4px); }
      100% { transform: translateX(-20px) translateY(0px); }
    }

    .main-content {
      position: relative;
      z-index: 20;
      max-width: 880px;
      margin: 0 auto;
    }

    .profile-box, .progress-box, .checkin-grid, .certificate {
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(6px);
      border-radius: 16px;
      box-shadow: 0 8px 20px rgba(0, 80, 80, 0.1);
      border: 1px solid rgba(0,168,181,0.3);
      transition: all 0.2s;
    }

    .profile-box {
      text-align: center;
      padding: 16px 16px 18px 16px;
      margin-bottom: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .profile-box img {
      width: 80px !important;
      height: auto;
      margin-bottom: 4px;
    }
    .profile-box h2 {
      font-size: 1.35rem;
      margin: 4px 0 2px 0;
      font-weight: 700;
      color: #007582;
    }
    .profile-input {
      width: 70%;
      max-width: 280px;
      padding: 8px 16px;
      font-size: 16px;
      border-radius: 16px;
      border: 2px solid #7fd6d6;
      outline: none;
      text-align: center;
      background: white;
      font-weight: 500;
      margin-top: 6px;
    }

    .progress-box {
      padding: 14px 20px;
      margin-bottom: 22px;
    }
    .progress-box h3 {
      font-size: 1.1rem;
      margin-bottom: 8px;
    }
    .progress-bar {
      width: 100%;
      height: 18px;
      background: #c8efef;
      border-radius: 16px;
      overflow: hidden;
      margin: 8px 0 12px 0;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: #ff8c00;
      border-radius: 16px;
      transition: width 0.4s ease;
    }
    .reset-btn {
      padding: 6px 18px;
      font-size: 13px;
      background: #00a8b5;
      color: white;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
    }
    .reset-btn:hover {
      background: #00707a;
      transform: scale(0.97);
    }

    .checkin-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(70px, 1fr));
      gap: 16px 12px;
      padding: 20px 18px;
    }

    .checkin-item {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 0;
    }

    .checkin-icon {
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      transition: 0.2s;
      display: block;
      border-radius: 16px;
      width: 100%;
      display: flex;
      justify-content: center;
    }

    .checkin-icon img {
      width: 68px;
      height: 68px;
      object-fit: contain;
      filter: grayscale(0.5) brightness(0.75);
      transition: 0.2s;
      border-radius: 16px;
      background: rgba(235, 248, 245, 0.6);
      padding: 6px;
      max-width: 100%;
    }

    .checkin-icon.done img {
      filter: grayscale(0) brightness(1.05);
      transform: scale(1.02);
      background: rgba(0,168,181,0.2);
      box-shadow: 0 0 6px #00a8b5;
    }

    .click-anim {
      animation: popAnim 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.2);
    }

    @keyframes popAnim {
      0% { transform: scale(1); }
      50% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }

    .checkin-label {
      margin-top: 8px;
      font-size: 11px;
      font-weight: 600;
      background: rgba(0,124,137,0.1);
      padding: 4px 8px;
      border-radius: 16px;
      color: #015c66;
      width: auto;
      max-width: 100%;
      line-height: 1.25;
      word-break: break-word;
      text-align: center;
    }

    .certificate {
      margin-top: 28px;
      padding: 20px 18px;
      text-align: center;
      display: none;
      animation: fadeSlide 0.4s;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
    }
    .certificate h2 {
      font-size: 1.5rem;
    }
    .certificate p {
      font-size: 0.95rem;
    }
    .download-btn {
      margin-top: 16px;
      padding: 8px 22px;
      background: #00a8b5;
      border: none;
      border-radius: 16px;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    /* ===== НОВАЯ КРУПНАЯ ЯРКАЯ КНОПКА "НАЗАД" ===== */
    .back-btn {
      position: fixed;
      bottom: 30px;
      left: 30px;
      padding: 10px 24px;
      background: #24b3a7;
      color: white;
      text-decoration: none;
      border-radius: 16px;
      font-weight: 600;
      z-index: 99;
      font-size: 18px;

      transition: all 0.25s ease;
      box-shadow: 0 4px 20px rgba(0, 200, 200, 0.5);
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.15);
      backdrop-filter: blur(4px);
    }

    .back-btn:hover {
      background: #00f0f0;
      transform: scale(1.05) translateY(-2px);
      box-shadow: 0 6px 30px rgba(0, 220, 220, 0.7);
    }

    .back-btn:active {
      transform: scale(0.95);
    }

    @media (max-width: 780px) {
      .main-content { max-width: 100%; padding: 0 6px; }
      .checkin-grid { gap: 10px; padding: 14px 12px; }
      .checkin-icon img { width: 56px; height: 56px; padding: 5px; }
      .checkin-label { font-size: 9px; padding: 3px 6px; margin-top: 6px; }
      .profile-box img { width: 70px !important; }
      .profile-box h2 { font-size: 1.2rem; }
      .profile-input { width: 85%; font-size: 14px; }
      .progress-box { padding: 12px 16px; }
      .ai-fish { font-size: 9px; padding: 2px 6px; white-space: nowrap; }
      .paper-boat { width: 55px; bottom: 6%; left: 2%; }

      .back-btn {
        bottom: 20px;
        left: 20px;
        padding: 12px 24px;
        font-size: 16px;
        border-radius: 14px;
      }
    }

    @media (max-width: 560px) {
      .checkin-grid { gap: 8px; }
      .checkin-icon img { width: 50px; height: 50px; padding: 4px; }
      .checkin-label { font-size: 8px; padding: 2px 4px; }
      .checkin-grid { padding: 12px 8px; }

      .back-btn {
        bottom: 16px;
        left: 16px;
        padding: 10px 20px;
        font-size: 14px;
        border-radius: 12px;
      }
    }

    @media (max-width: 480px) {
      .checkin-icon img { width: 46px; height: 46px; padding: 4px; }
      .checkin-label { font-size: 7.5px; }
      .checkin-grid { gap: 6px; }
      .profile-box img { width: 60px !important; }

      .back-btn {
        bottom: 12px;
        left: 12px;
        padding: 8px 16px;
        font-size: 12px;
        border-radius: 10px;
      }
    }

    #savedToast {
      position: fixed;
      bottom: 70px;
      right: 16px;
      background: rgba(0, 130, 120, 0.94);
      backdrop-filter: blur(6px);
      color: white;
      padding: 8px 18px;
      border-radius: 16px;
      font-size: 12px;
      font-weight: 700;
      z-index: 999;
      box-shadow: 0 4px 12px rgba(0,80,80,0.3);
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.25s ease, transform 0.22s ease;
      pointer-events: none;
    }
    #savedToast.show {
      opacity: 1;
      transform: translateY(0);
    }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <canvas id="seaCanvas"></canvas>

  <div class="ai-fish fish9" style="top: 15%; right: 10%; animation: swimLazy 28s infinite alternate-reverse;"><svg width="14" height="10" viewBox="0 0 14 10"><path d="M1 5 C1 5 3 1 7 1 C11 1 13 5 13 5 C13 5 11 9 7 9 C3 9 1 5 1 5Z" fill="#4db6ac"/><circle cx="9.5" cy="4" r="1" fill="white"/><path d="M1 5 L-1 3 L-1 7 Z" fill="#4db6ac"/></svg>Perplexity</div>

  <div class="main-content">
    <div class="profile-box">
      <img src="octo19.png" alt="octo mascot" style="height: auto; width: 80px;">
      <h2>ИИ-профиль "Океан навыков"</h2>
      <input id="profileName" class="profile-input" type="text" placeholder="Введите имя" style="text-align: center;">
    </div>

    <div class="progress-box">
      <h3>Прогресс мастерства: <span id="progressCount">0</span>/16</h3>
      <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
      <button class="reset-btn" id="resetBtn">⟳ Сбросить осьминогов</button>
    </div>

    <div class="checkin-grid" id="checkinGrid"></div>

    <div id="certificate" class="certificate">
      <img src="octo19.png" alt="octo mascot" style="height: auto; width: 80px;">
      <h2>МОЛОДЕЦ</h2>
      <p id="certName" style="font-weight: 800; font-size: 24px;"></p>
      <p>✨ освоил(а) все 16 навыков цифрового океана ✨</p>
      <button class="download-btn" id="downloadBtn">📥 Скачать сертификат</button>
    </div>

    <!-- НОВАЯ КРУПНАЯ ЯРКАЯ КНОПКА "НАЗАД" -->
    <a href="../index.html" class="back-btn">← Назад</a>
  </div>

  <div id="savedToast">✅ Прогресс сохранён</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script>
    (function() {
      const skills = [
        { id: 1,  label: "Опознаю по картинке",         img: "octo1.png"  },
        { id: 2,  label: "Креатив с Азикой",           img: "octo2.png"  },
        { id: 3,  label: "Рисую ещё круче",            img: "octo3.png"  },
        { id: 4,  label: "Знаю, что такое промпт",     img: "octo4.png"  },
        { id: 5,  label: "Синтезирую речь",            img: "octo5.png"  },
        { id: 6,  label: "Мастер анимации",            img: "octo6.png"  },
        { id: 7,  label: "Пишу тексты как профи",      img: "octo7.png"  },
        { id: 8,  label: "Мастер диалогов",            img: "octo8.png"  },
        { id: 9,  label: "Инфографика – сила",         img: "octo9.png"  },
        { id: 10, label: "Не тестами едиными",         img: "octo10.png" },
        { id: 11, label: "Строю 3D модели",            img: "octo11.png" },
        { id: 12, label: "Всё распланирую",            img: "octo12.png" },
        { id: 13, label: "Что наша жизнь – игра",      img: "octo13.png" },
        { id: 14, label: "Диаграммы +",                img: "octo14.png" },
        { id: 15, label: "Всё презентую",              img: "octo15.png" },
        { id: 16, label: "Плагиат не скрылся",         img: "octo16.png" }
      ];

      const STORE_KEY = "octo_checkin_snapshot_v3";

      function saveFullProgress() {
        try {
          const nameInput = document.getElementById("profileName");
          const name = nameInput ? nameInput.value : "";
          const doneIds = [];
          document.querySelectorAll(".checkin-icon.done").forEach(btn => {
            const id = btn.getAttribute("data-id");
            if (id) doneIds.push(id);
          });
          const state = { name: name, done: doneIds, version: 3, lastUpdated: Date.now() };
          localStorage.setItem(STORE_KEY, JSON.stringify(state));
        } catch(e) { console.warn(e); }
      }

      function loadProgressAndRestore() {
        try {
          const raw = localStorage.getItem(STORE_KEY);
          if (!raw) {
            const oldSnapshot = localStorage.getItem("octo_checkin_snapshot");
            if (oldSnapshot) {
              try {
                const oldState = JSON.parse(oldSnapshot);
                if (oldState && typeof oldState === 'object') restoreFromState(oldState);
                else restoreFromLegacyKeys();
              } catch(e) { restoreFromLegacyKeys(); }
            } else {
              restoreFromLegacyKeys();
            }
            return;
          }
          const state = JSON.parse(raw);
          if (state && typeof state === 'object') restoreFromState(state);
          else restoreFromLegacyKeys();
        } catch(e) { restoreFromLegacyKeys(); }
      }

      function restoreFromState(state) {
        const nameInput = document.getElementById("profileName");
        if (nameInput && state.name !== undefined) nameInput.value = state.name;
        const doneSet = new Set((state.done || []).map(String));
        document.querySelectorAll(".checkin-icon").forEach(btn => {
          const id = btn.getAttribute("data-id");
          if (id && doneSet.has(id)) btn.classList.add("done");
          else btn.classList.remove("done");
        });
        updateProgressAndCert();
      }

      function restoreFromLegacyKeys() {
        const savedName = localStorage.getItem("octo_profile_name");
        if (savedName) {
          const nameInput = document.getElementById("profileName");
          if (nameInput) nameInput.value = savedName;
        }
        document.querySelectorAll(".checkin-icon").forEach(btn => {
          const id = btn.getAttribute("data-id");
          if (!id) return;
          const legacyDone = localStorage.getItem("checkin_" + id);
          const newLegacy = localStorage.getItem("octo_checkin_" + id);
          if (legacyDone === "done" || newLegacy === "done") btn.classList.add("done");
          else btn.classList.remove("done");
        });
        updateProgressAndCert();
        saveFullProgress();
        for (let i = 1; i <= 16; i++) {
          localStorage.removeItem("checkin_" + i);
          localStorage.removeItem("octo_checkin_" + i);
        }
        localStorage.removeItem("octo_checkin_snapshot");
      }

      function updateProgressAndCert() {
        const doneCount = document.querySelectorAll(".checkin-icon.done").length;
        const progressSpan = document.getElementById("progressCount");
        if (progressSpan) progressSpan.innerText = doneCount;
        const percent = (doneCount / 16) * 100;
        const fillBar = document.getElementById("progressFill");
        if (fillBar) fillBar.style.width = percent + "%";

        const allDone = (doneCount === 16);
        const nameInput = document.getElementById("profileName");
        const userName = nameInput ? nameInput.value.trim() : "";
        const certBlock = document.getElementById("certificate");
        if (certBlock) {
          if (allDone && userName !== "") {
            document.getElementById("certName").innerText = userName;
            certBlock.style.display = "block";
          } else {
            certBlock.style.display = "none";
          }
        }
      }

      let toastTimer = null;
      function showSavedToast() {
        const toast = document.getElementById("savedToast");
        if (!toast) return;
        toast.classList.add("show");
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toast.classList.remove("show"), 1500);
      }

      const grid = document.getElementById("checkinGrid");
      function buildGrid() {
        if (!grid) return;
        grid.innerHTML = "";
        skills.forEach(s => {
          const item = document.createElement("div");
          item.className = "checkin-item";
          const btn = document.createElement("button");
          btn.className = "checkin-icon";
          btn.setAttribute("data-id", s.id);
          const img = document.createElement("img");
          img.src = s.img;
          img.alt = s.label;
          btn.appendChild(img);
          const labelSpan = document.createElement("div");
          labelSpan.className = "checkin-label";
          labelSpan.innerText = s.label;
          item.appendChild(btn);
          item.appendChild(labelSpan);
          grid.appendChild(item);
        });
      }
      buildGrid();

      document.addEventListener("click", (e) => {
        const iconBtn = e.target.closest('.checkin-icon');
        if (!iconBtn) return;
        iconBtn.classList.toggle('done');
        iconBtn.classList.add('click-anim');
        setTimeout(() => iconBtn.classList.remove('click-anim'), 200);
        saveFullProgress();
        showSavedToast();
        updateProgressAndCert();
      });

      const nameField = document.getElementById("profileName");
      if (nameField) {
        nameField.addEventListener("input", () => {
          saveFullProgress();
          updateProgressAndCert();
        });
      }

      const resetBtn = document.getElementById("resetBtn");
      if (resetBtn) {
        resetBtn.addEventListener("click", () => {
          if (!confirm("Сбросить весь прогресс и имя? Навыки обнулятся.")) return;
          document.querySelectorAll(".checkin-icon").forEach(btn => btn.classList.remove("done"));
          if (nameField) nameField.value = "";
          localStorage.removeItem(STORE_KEY);
          updateProgressAndCert();
          saveFullProgress();
          showSavedToast();
        });
      }

      const downloadBtn = document.getElementById("downloadBtn");
      if (downloadBtn) {
        downloadBtn.addEventListener("click", async () => {
          const certElem = document.getElementById("certificate");
          if (!certElem) return;
          try {
            const canvas = await html2canvas(certElem, {
              scale: 2.2,
              backgroundColor: "#FFFFFF",
              logging: false,
              useCORS: true,
              allowTaint: false
            });
            const link = document.createElement("a");
            let userName = nameField ? nameField.value.trim() : "hero";
            if (!userName) userName = "hero";
            const safeName = userName.replace(/[^a-zа-яё0-9]/gi, '_');
            link.download = `certificate_${safeName}.png`;
            link.href = canvas.toDataURL("image/png");
            link.click();
          } catch (error) {
            alert("Не удалось создать изображение. Попробуйте ещё раз.");
          }
        });
      }

      loadProgressAndRestore();
      window.addEventListener("beforeunload", () => saveFullProgress());
      window.addEventListener("pagehide", () => saveFullProgress());
      document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "hidden") saveFullProgress();
      });
    })();

    // Анимированный океан
    const canvas = document.getElementById("seaCanvas");
    let ctx = canvas.getContext("2d");
    let width, height;
    let time = 0;

    function resizeCanvas() {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width;
      canvas.height = height;
    }

    function drawOcean() {
      const grad = ctx.createLinearGradient(0, 0, 0, height);
      grad.addColorStop(0, "#b4dfe5");
      grad.addColorStop(0.7, "#7fc7d1");
      grad.addColorStop(1, "#4699a6");
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, width, height);

      for (let i = 0; i < 12; i++) {
        ctx.beginPath();
        const yOff = height * (0.6 + i * 0.025);
        let x = 0;
        ctx.moveTo(0, yOff + Math.sin(time * 0.002 + i) * 5);
        for (x = 0; x <= width; x += 35) {
          ctx.lineTo(x, yOff + Math.sin(x * 0.009 + time * 0.003 + i * 1.2) * 7);
        }
        ctx.lineTo(width, height);
        ctx.lineTo(0, height);
        ctx.fillStyle = `rgba(255, 250, 235, ${0.07 - i * 0.003})`;
        ctx.fill();
      }

      for (let i = 0; i < 70; i++) {
        ctx.fillStyle = `rgba(255, 255, 210, ${0.2 + Math.sin(time * 0.005 + i) * 0.1})`;
        ctx.beginPath();
        ctx.arc((i * 131) % width, (height * 0.4 + Math.sin(time * 0.003 + i) * 12 + i * 7) % height, 2, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.fillStyle = "rgba(245, 255, 240, 0.06)";
      for (let s = 0; s < 12; s++) {
        ctx.beginPath();
        ctx.ellipse(width * (0.1 + Math.sin(time * 0.0004 + s) * 0.3), height * 0.2 + s * 25, 60, 30, 0, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function animateSea() {
      time++;
      drawOcean();
      requestAnimationFrame(animateSea);
    }

    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();
    animateSea();
  </script>
</body>
</html>
